id: "license.common"
label: "Driver's license"
description: "Common OCR text fields for Canadian and US driver's license or ID card images."

routing:
  markers:
    strong:
      - "Driver's license"
      - "Driver license"
      - "Driver's licence"
      - "Driver licence"
      - "Permis de conduire"
      - "License No"
      - "Licence No"
      - "DLN"
    weak:
      - "Date of birth"
      - "DOB"
      - "Sex"
      - "Height"
      - "Eyes"
      - "Class"
      - "Expiry"
      - "Expires"
      - "Address"

review:
  required_fields:
    - "license_number"
    - "address"
    - "date_of_birth"
    - "sex"
  required_groups:
    - id: "holder_name"
      label: "Cardholder name"
      any_of:
        - "name_full"
      all_of:
        - "surname"
        - "given_names"

fields:
  license_number:
    label: "Driver's license or ID number"
    repeat_detection: true
    description: "The driver's license, ID card, customer, or document number."
    anchors:
      - "Driver's license number"
      - "Driver license number"
      - "License number"
      - "Licence number"
      - "DL"
      - "DLN"
      - "ID number"
      - "ID No"
      - "Customer identifier"
      - "Document number"
      - "Number"

  name_full:
    label: "Full name"
    repeat_detection: true
    max_value_fragments: 3
    description: "The full visible cardholder name when the name appears as one combined field."
    anchors:
      - "Name"
      - "Full name"
      - "Cardholder name"
      - "Customer name"

  surname:
    label: "Surname or last name"
    repeat_detection: true
    description: "The cardholder's surname, family name, or last name when shown separately."
    anchors:
      - "Surname"
      - "Last name"
      - "Family name"
      - "LN"

  given_names:
    label: "Given names or first name"
    repeat_detection: true
    max_value_fragments: 2
    description: "The cardholder's given names or first name when shown separately."
    anchors:
      - "Given names"
      - "Given name"
      - "First name"
      - "FN"

  address:
    label: "Address"
    repeat_detection: true
    max_value_fragments: 4
    description: "The cardholder's residential, mailing, or street address."
    anchors:
      - "Address"
      - "Addr"
      - "Street address"
      - "Residence address"

  date_of_birth:
    label: "Date of birth"
    repeat_detection: true
    description: "The cardholder's date of birth."
    anchors:
      - "Date of birth"
      - "DOB"
      - "Birth date"
      - "Birth"

  issue_date:
    label: "Issue date"
    description: "The date the driver's license or ID card was issued."
    anchors:
      - "Issue date"
      - "Date of issue"
      - "Issued"
      - "ISS"

  expiry_date:
    label: "Expiry date"
    description: "The date the driver's license or ID card expires."
    anchors:
      - "Expiry date"
      - "Expiration date"
      - "Date of expiry"
      - "Date of expiration"
      - "Expires"
      - "EXP"

  sex:
    label: "Sex"
    description: "The cardholder's sex or gender marker."
    anchors:
      - "Sex"
      - "Gender"

  height:
    label: "Height"
    description: "The cardholder's height measurement."
    anchors:
      - "Height"
      - "Hgt"
      - "Ht"

  eye_color:
    label: "Eye color"
    description: "The cardholder's eye color, when present."
    anchors:
      - "Eyes"
      - "Eye color"
      - "Eye colour"
      - "EYE"

  reference_number:
    label: "Reference or document reference number"
    repeat_detection: true
    description: "A card-specific reference, document discriminator, DD, or REF number that identifies the physical license card or card issuance."
    anchors:
      - "REF"
      - "DD"
      - "DD REF"
      - "Document discriminator"
      - "Document reference"
      - "Reference number"
