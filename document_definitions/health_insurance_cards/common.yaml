id: "health_insurance_card.common"
label: "Health insurance card"
description: "Common OCR-readable fields for health insurance, benefits, and prescription drug cards."

routing:
  markers:
    strong:
      - "Health insurance"
      - "Health care"
      - "Healthcare"
      - "Member ID"
      - "Member Number"
      - "RxBIN"
      - "Rx BIN"
      - "RxPCN"
      - "Rx Group"
    weak:
      - "Policy"
      - "Group"
      - "Subscriber"
      - "Certificate"
      - "Plan"
      - "Member"
      - "Pharmacare"
      - "Benefits"

document_hints:
  - "This definition targets member/person identifiers and plan-specific identifiers."
  - "Do not redact insurer branding, generic coverage labels, member services phone numbers, websites, or payer mailing addresses unless they are selected as configured fields."
  - "Dependent names may appear as separate rows or in a family/member list."

review:
  required_fields:
    - "member_id"
  required_groups:
    - id: "primary_member_name"
      label: "Member name"
      any_of:
        - "member_name"
      all_of:
        - "surname"
        - "given_names"

fields:
  member_name:
    label: "Member name"
    repeat_detection: true
    max_value_fragments: 3
    description: "The primary member, subscriber, cardholder, employee, or insured person's name when shown as one combined field."
    anchors:
      - "Member name"
      - "Member"
      - "Subscriber"
      - "Subscriber name"
      - "Cardholder"
      - "Cardholder name"
      - "Insured"
      - "Insured name"
      - "Employee"
      - "Employee name"
      - "Name"

  surname:
    label: "Surname or last name"
    repeat_detection: true
    max_value_fragments: 2
    description: "The member, subscriber, cardholder, employee, or insured person's surname or last name when shown separately."
    anchors:
      - "Surname"
      - "Last name"
      - "Family name"
      - "Nom"

  given_names:
    label: "Given names or first name"
    repeat_detection: true
    max_value_fragments: 3
    description: "The member, subscriber, cardholder, employee, or insured person's given names or first name when shown separately."
    anchors:
      - "Given names"
      - "Given name"
      - "First name"
      - "Forename"
      - "Prenoms"
      - "PrÃ©noms"

  dependent_names:
    label: "Dependent names"
    repeat_detection: true
    max_value_fragments: 8
    description: "Names of dependents, spouse, children, covered family members, or listed participants."
    anchors:
      - "Dependent"
      - "Dependents"
      - "Dependent name"
      - "Covered dependents"
      - "Spouse"
      - "Child"
      - "Family member"
      - "Covered member"

  member_id:
    label: "Member ID"
    repeat_detection: true
    max_value_fragments: 3
    description: "The member, card, participant, benefits, or health insurance identifier."
    anchors:
      - "Member ID"
      - "Member No"
      - "Member number"
      - "Card ID"
      - "Card No"
      - "ID"
      - "ID No"
      - "Identification number"
      - "Participant ID"
      - "Benefits ID"

  subscriber_id:
    label: "Subscriber ID"
    repeat_detection: true
    max_value_fragments: 3
    description: "The subscriber, employee, or primary insured identifier."
    anchors:
      - "Subscriber ID"
      - "Subscriber No"
      - "Subscriber number"
      - "Employee ID"
      - "Employee No"
      - "Primary insured ID"
      - "Insured ID"

  policy_number:
    label: "Policy number"
    repeat_detection: true
    max_value_fragments: 3
    description: "The policy number or policy identifier."
    anchors:
      - "Policy"
      - "Policy number"
      - "Policy No"
      - "Policy ID"

  group_number:
    label: "Group number"
    repeat_detection: true
    max_value_fragments: 3
    description: "The group number, group ID, employer group, or benefits group identifier."
    anchors:
      - "Group"
      - "Group number"
      - "Group No"
      - "Group ID"
      - "Grp"
      - "Grp No"
      - "Employer group"

  certificate_number:
    label: "Certificate number"
    repeat_detection: true
    max_value_fragments: 3
    description: "The certificate, coverage, or benefits certificate number."
    anchors:
      - "Certificate"
      - "Certificate number"
      - "Certificate No"
      - "Cert"
      - "Cert No"
      - "Coverage number"

  plan_number:
    label: "Plan number"
    repeat_detection: true
    max_value_fragments: 3
    description: "A plan number, plan ID, class, division, or package identifier."
    anchors:
      - "Plan"
      - "Plan number"
      - "Plan No"
      - "Plan ID"
      - "Class"
      - "Division"
      - "Package"

  contract_number:
    label: "Contract number"
    repeat_detection: true
    max_value_fragments: 3
    description: "A contract, client, carrier, or account identifier associated with the health insurance plan."
    anchors:
      - "Contract"
      - "Contract number"
      - "Contract No"
      - "Client number"
      - "Client No"
      - "Carrier ID"
      - "Account number"

  rx_bin:
    label: "Rx BIN"
    description: "The pharmacy benefit BIN identifier."
    anchors:
      - "BIN"
      - "Rx BIN"
      - "RxBIN"
      - "Pharmacy BIN"

  rx_pcn:
    label: "Rx PCN"
    description: "The pharmacy benefit PCN identifier."
    anchors:
      - "PCN"
      - "Rx PCN"
      - "RxPCN"
      - "Processor control number"

  rx_group:
    label: "Rx group"
    description: "The pharmacy benefit Rx group identifier."
    anchors:
      - "Rx Group"
      - "RxGroup"
      - "Rx Grp"
      - "Pharmacy group"

  rx_id:
    label: "Rx ID"
    repeat_detection: true
    max_value_fragments: 3
    description: "The prescription benefit member or pharmacy ID."
    anchors:
      - "Rx ID"
      - "RxID"
      - "Pharmacy ID"
      - "Prescription ID"

  date_of_birth:
    label: "Date of birth"
    repeat_detection: true
    description: "The member or dependent date of birth."
    anchors:
      - "Date of birth"
      - "DOB"
      - "Birth date"
      - "Born"

  sex:
    label: "Sex"
    description: "The member or dependent sex or gender marker."
    anchors:
      - "Sex"
      - "Gender"
