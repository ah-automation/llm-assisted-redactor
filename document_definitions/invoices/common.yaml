id: "invoice.common"
label: "Invoice"
description: "Common OCR text fields for invoices, statements, bills, and order invoices."

routing:
  markers:
    strong:
      - "Invoice"
      - "Statement"
      - "Bill To"
      - "Ship To"
      - "Amount Due"
      - "Balance Due"
      - "Payment Due"
    weak:
      - "Account number"
      - "Customer"
      - "Subtotal"
      - "Total"
      - "Tax"
      - "Payment reference"
      - "Due date"

review:
  required_fields:
    - "customer_name"
    - "customer_address"

fields:
  customer_name:
    label: "Customer name"
    repeat_detection: true
    max_value_fragments: 2
    description: "The individual customer, client, patient, tenant, or recipient name shown on the invoice."
    anchors:
      - "Bill To"
      - "Ship To"
      - "Customer"
      - "Customer name"
      - "Client"
      - "Client name"
      - "Patient"
      - "Recipient"

  customer_address:
    label: "Customer address"
    max_value_fragments: 4
    description: "The address belonging to the billed customer, recipient, account holder, patient, or client. Prefer an address near the customer name. Do not choose the vendor, remittance, payment, lockbox, or return address."
    anchors:
      - "Bill To"
      - "Billing address"
      - "Customer address"
      - "Mailing address"
      - "Client address"
      - "Service address"
      - "Account holder"

  shipping_address:
    label: "Shipping address"
    repeat_detection: true
    max_value_fragments: 4
    description: "The customer's shipping, service, or delivery address, when different from the billing/customer address. Do not choose the vendor, remittance, payment, lockbox, or return address."
    anchors:
      - "Ship To"
      - "Shipping address"
      - "Service address"
      - "Delivery address"

  email:
    label: "Email address"
    repeat_detection: true
    description: "The customer's email address."
    anchors:
      - "Email"
      - "E-mail"
      - "Contact email"

  phone:
    label: "Phone number"
    repeat_detection: true
    description: "The customer's phone or contact number. Do not select vendor, support, payment, help desk, sales, or customer service phone numbers."
    anchors:
      - "Phone"
      - "Telephone"
      - "Tel"
      - "Contact"
      - "Mobile"

  account_number:
    label: "Account number"
    repeat_detection: true
    description: "A customer account, client account, or billing account identifier."
    anchors:
      - "Account"
      - "Account number"
      - "Account No"
      - "Acct"
      - "Acct No"
      - "Billing account"

  customer_number:
    label: "Customer number"
    repeat_detection: true
    description: "A customer, client, patient, or recipient identifier."
    anchors:
      - "Customer No"
      - "Customer number"
      - "Customer ID"
      - "Client No"
      - "Client ID"
      - "Patient ID"
      - "Recipient ID"

  invoice_number:
    label: "Invoice number"
    repeat_detection: true
    description: "The invoice, statement, bill, order, or work order identifier."
    anchors:
      - "Invoice No"
      - "Invoice number"
      - "Invoice"
      - "Statement No"
      - "Bill No"
      - "Order No"
      - "Order number"
      - "Work Order"

  payment_reference:
    label: "Payment reference"
    repeat_detection: true
    description: "A payment reference, payment code, or remittance identifier."
    anchors:
      - "Payment reference"
      - "Payment ref"
      - "Reference"
      - "Remittance"
      - "Payment code"
