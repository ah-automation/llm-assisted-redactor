id: "canadian_passport"
label: "Canadian passport"
description: "Canadian regular passport biographical data page."

document_hints:
  - "The document is expected to be a Canadian passport biographical data page."
  - "The page may be photographed or scanned at different angles."
  - "Use visible labels, bilingual labels, layout, and nearby values to locate each configured field."
  - "Return boxes around the field value only unless the field definition says otherwise."
  - "Do not transcribe actual field values."

fields:
  - id: "passport_number"
    label: "Passport number"
    description: "The passport document number."
    anchors:
      - "Passport No"
      - "No de passeport"
    location_hints:
      - "Usually near the upper portion of the data page."
      - "The value is close to the Passport No / No de passeport label."
    redact_instruction: "Box only the passport number value, not the label."

  - id: "surname"
    label: "Surname"
    description: "The holder's family name or surname."
    anchors:
      - "Surname"
      - "Nom"
    location_hints:
      - "Usually in the personal details area near the holder name fields."
    redact_instruction: "Box only the surname value, not the label."

  - id: "given_names"
    label: "Given names"
    description: "The holder's given name or names."
    anchors:
      - "Given names"
      - "Prenoms"
    location_hints:
      - "Usually near the surname field."
    redact_instruction: "Box only the given name value, not the label."

  - id: "nationality"
    label: "Nationality"
    description: "The holder's nationality."
    anchors:
      - "Nationality"
      - "Nationalite"
    location_hints:
      - "Usually near the name, sex, or date of birth fields."
    redact_instruction: "Box only the nationality value, not the label."

  - id: "date_of_birth"
    label: "Date of birth"
    description: "The holder's date of birth."
    anchors:
      - "Date of birth"
      - "Date de naissance"
      - "DOB"
    location_hints:
      - "Usually in the personal details area."
    redact_instruction: "Box only the birth date value, not the label."

  - id: "sex"
    label: "Sex"
    description: "The holder's sex or gender marker."
    anchors:
      - "Sex"
      - "Sexe"
    location_hints:
      - "Usually near date of birth or nationality."
    redact_instruction: "Box only the sex marker value, not the label."

  - id: "place_of_birth"
    label: "Place of birth"
    description: "The holder's place of birth."
    anchors:
      - "Place of birth"
      - "Lieu de naissance"
    location_hints:
      - "Usually near date of birth, sex, or issuing information."
    redact_instruction: "Box only the place of birth value, not the label."

  - id: "date_of_issue"
    label: "Date of issue"
    description: "The date the passport was issued."
    anchors:
      - "Date of issue"
      - "Date de delivrance"
    location_hints:
      - "Usually near the date of expiry or authority field."
    redact_instruction: "Box only the issue date value, not the label."

  - id: "date_of_expiry"
    label: "Date of expiry"
    description: "The date the passport expires."
    anchors:
      - "Date of expiry"
      - "Date d'expiration"
      - "Expiry date"
    location_hints:
      - "Usually near the date of issue."
    redact_instruction: "Box only the expiry date value, not the label."

  - id: "issuing_authority"
    label: "Issuing authority"
    description: "The passport issuing authority."
    anchors:
      - "Authority"
      - "Autorite"
    location_hints:
      - "Usually near the issue and expiry dates."
    redact_instruction: "Box only the authority value, not the label."

  - id: "signature"
    label: "Signature"
    description: "The holder's signature."
    anchors:
      - "Signature"
      - "Signature du titulaire"
    location_hints:
      - "Usually near the lower portion of the data page."
    redact_instruction: "Box the visible signature region."

  - id: "photo"
    label: "Photo"
    description: "The holder's portrait photo."
    anchors:
      - "Photo"
    location_hints:
      - "Usually one large portrait appears on the data page."
      - "Some versions include a secondary smaller photo."
    redact_instruction: "Box each visible holder portrait photo."

  - id: "mrz"
    label: "Machine-readable zone"
    description: "The machine-readable zone containing passport data."
    anchors:
      - "Machine-readable zone"
      - "MRZ"
    location_hints:
      - "Usually two lines at the bottom of the data page."
      - "The text often contains many < characters."
    redact_instruction: "Box the full visible machine-readable zone."
