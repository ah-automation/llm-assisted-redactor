id: "cheque.common"
label: "Cheque"
description: "Common OCR-readable printed fields for cheque and check images."

routing:
  markers:
    strong:
      - "Pay to the order of"
      - "PAY TO THE"
      - "ORDER OF"
      - "DOLLARS"
      - "MEMO"
    weak:
      - "Cheque"
      - "Check"
      - "Routing"
      - "Transit"
      - "Account"
      - "MICR"

document_hints:
  - "This definition targets printed cheque information that OCR can read."
  - "Handwritten payee, handwritten amounts, memo text, and signatures are out of scope unless OCR detects them clearly."
  - "Prefer redacting printed identifiers and MICR-style banking numbers over handwritten content."

review:
  required_fields:
    - "bank_account_number"

fields:
  account_holder_name:
    label: "Account holder name"
    repeat_detection: true
    max_value_fragments: 3
    description: "The printed personal or business name of the cheque account holder. Do not choose the bank name."
    anchors:
      - "Account holder"
      - "Name"
      - "Business name"
      - "Company name"
    match_hints:
      - "This is often printed near the top left of a cheque, above or near the account holder address."

  account_holder_address:
    label: "Account holder address"
    repeat_detection: true
    max_value_fragments: 4
    description: "The printed mailing or business address of the cheque account holder. Do not choose the bank branch address."
    anchors:
      - "Address"
      - "Account holder address"
      - "Mailing address"
      - "Business address"
    match_hints:
      - "This is often printed near the top left of a cheque, below the account holder name."

  account_holder_phone:
    label: "Account holder phone number"
    repeat_detection: true
    description: "The account holder's printed phone or contact number. Do not choose bank, branch, customer service, or security feature phone numbers."
    anchors:
      - "Phone"
      - "Telephone"
      - "Tel"
      - "Mobile"
      - "Contact"
    match_hints:
      - "Prefer a phone number near the account holder name and address."
      - "A combined fragment such as 'TEL:03-3474-2120' should be treated as the phone value."

  payee_name:
    label: "Payee name"
    repeat_detection: true
    max_value_fragments: 3
    description: "The readable payee or recipient value on the 'Pay to the order of' line. Do not choose account holder, payer, drawer, bank, or address details."
    anchors:
      - "Pay to the order of"
      - "Pay to"
      - "Order of"
      - "Payee"
      - "Pay"
    match_hints:
      - "The anchor may be split across fragments such as 'PAY TO THE' and 'ORDER OF'."
      - "Choose the nearby value written or printed on the payee line, usually to the right of or below the anchor."
      - "Prefer a value in the same horizontal band as the payee anchors."
      - "Synthetic values such as 'Sample Check' should still be treated as payee values."

  cheque_number:
    label: "Cheque number"
    repeat_detection: true
    description: "The cheque or check number, often printed near the top right and repeated in the MICR line."
    anchors:
      - "Cheque number"
      - "Check number"
      - "Cheque No"
      - "Check No"
      - "No"

  bank_account_number:
    label: "Bank account number"
    repeat_detection: true
    max_value_fragments: 3
    description: "The bank account number printed on the cheque or embedded in the MICR line."
    anchors:
      - "Account number"
      - "Account No"
      - "Account"
      - "Acct"
      - "MICR"

  routing_number:
    label: "Routing number"
    repeat_detection: true
    max_value_fragments: 2
    description: "A US-style routing number printed on the cheque or embedded in the MICR line."
    anchors:
      - "Routing number"
      - "Routing No"
      - "Routing"
      - "ABA"
      - "MICR"

  transit_number:
    label: "Transit number"
    repeat_detection: true
    max_value_fragments: 2
    description: "A Canadian-style transit or branch number printed on the cheque or embedded in the MICR line."
    anchors:
      - "Transit number"
      - "Transit No"
      - "Transit"
      - "Branch number"
      - "Branch No"
      - "MICR"

  institution_number:
    label: "Institution number"
    repeat_detection: true
    max_value_fragments: 2
    description: "A Canadian-style financial institution number printed on the cheque or embedded in the MICR line."
    anchors:
      - "Institution number"
      - "Institution No"
      - "Institution"
      - "Bank number"
      - "MICR"

  micr_line:
    label: "MICR line"
    repeat_detection: true
    max_value_fragments: 6
    description: "The machine-readable cheque number, transit/routing, institution, and account number line near the bottom of the cheque."
    anchors:
      - "MICR"
      - "Routing"
      - "Transit"
      - "Account"
      - "Cheque"
      - "Check"
    match_hints:
      - "Prefer OCR fragments near the bottom edge that contain long numeric banking identifiers or MICR-like symbols."
      - "The MICR line may be split into multiple OCR fragments."
