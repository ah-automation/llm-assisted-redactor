id: "passport.common"
label: "Passport"
description: "Common OCR text fields for passport biographical data pages."

fragment_tags:
  mrz:
    label: "Machine-readable zone text"
    text_contains:
      - "<"
  field_label:
    label: "Printed field label"
    text_contains:
      - "passport no"
      - "passport number"
      - "surname"
      - "family name"
      - "last name"
      - "given names"
      - "given name"
      - "first name"
      - "nationality"
      - "date of birth"
      - "dob"
      - "place of birth"
      - "sex"
      - "height"
      - "date of issue"
      - "issue date"
      - "date of expiry"
      - "expiry date"
      - "date of expiration"
      - "expiration"

candidate_defaults:
  window:
    left: 0
    right: 0.08
    above: 0
    below: 0.06

field_defaults:
  max_value_fragments: 1
  excluded_fragment_tags:
    - "mrz"
    - "field_label"

fields:
  passport_number:
    label: "Passport number"
    type: "text"
    required: true
    description: "The passport document number."
    anchors:
      - "Passport No"
      - "Passport number"
    redaction:
      mode: "ocr_box"

  surname:
    label: "Surname"
    type: "text"
    required: true
    description: "The holder's family name or surname."
    anchors:
      - "Surname"
      - "Family name"
      - "Last name"
    redaction:
      mode: "ocr_box"

  given_names:
    label: "Given names"
    type: "text"
    required: true
    description: "The holder's given name or names."
    anchors:
      - "Given names"
      - "Given name"
      - "First name"
    redaction:
      mode: "ocr_box"

  nationality:
    label: "Nationality"
    type: "text"
    required: true
    max_value_fragments: 1
    description: "The holder's nationality."
    anchors:
      - "Nationality"
    redaction:
      mode: "ocr_box"

  date_of_birth:
    label: "Date of birth"
    type: "text"
    required: true
    description: "The holder's date of birth."
    anchors:
      - "Date of birth"
      - "DOB"
    redaction:
      mode: "ocr_box"

  sex:
    label: "Sex"
    type: "text"
    required: true
    description: "The holder's sex or gender marker."
    anchors:
      - "Sex"
    redaction:
      mode: "ocr_box"

  height:
    label: "Height"
    type: "text"
    required: false
    description: "The holder's height, when present."
    anchors:
      - "Height"
    redaction:
      mode: "ocr_box"

  place_of_birth:
    label: "Place of birth"
    type: "text"
    required: true
    description: "The holder's place of birth."
    anchors:
      - "Place of birth"
    redaction:
      mode: "ocr_box"

  date_of_issue:
    label: "Date of issue"
    type: "text"
    required: true
    description: "The date the passport was issued."
    anchors:
      - "Date of issue"
      - "Issue date"
    redaction:
      mode: "ocr_box"

  date_of_expiry:
    label: "Date of expiry"
    type: "text"
    required: true
    description: "The date the passport expires."
    anchors:
      - "Date of expiry"
      - "Expiry date"
      - "Date of expiration"
    redaction:
      mode: "ocr_box"

  mrz:
    label: "Machine-readable zone"
    type: "mrz"
    required: true
    max_value_fragments: 99
    excluded_fragment_tags: []
    description: "The machine-readable zone containing passport data."
    anchors:
      - "Machine-readable zone"
      - "MRZ"
    match_hints:
      - "Usually two lines near the bottom."
      - "Often contains many < characters."
    redaction:
      mode: "ocr_box"
