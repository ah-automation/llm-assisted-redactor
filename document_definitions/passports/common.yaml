id: "passport.common"
label: "Passport"
description: "Common OCR text fields for passport biographical data pages."

routing:
  markers:
    strong:
      - "Passport"
      - "PASSEPORT"
      - "Passport No"
      - "Passport number"
      - "Machine-readable zone"
    weak:
      - "Issuing country"
      - "Nationality"
      - "Date of birth"
      - "Place of birth"
      - "Date of issue"
      - "Date of expiry"
      - "<<"

review:
  required_fields:
    - "passport_number"
    - "surname"
    - "given_names"
    - "nationality"
    - "date_of_birth"
    - "sex"
    - "place_of_birth"
    - "date_of_issue"
    - "date_of_expiry"
    - "mrz"

fields:
  passport_number:
    label: "Passport or document number"
    description: "The passport, travel document, or document number printed in the main biographical data area."
    anchors:
      - "Passport No"
      - "Passport number"
      - "Document No"
      - "Document number"
      - "Travel document number"

  surname:
    label: "Surname"
    description: "The holder's family name or surname."
    anchors:
      - "Surname"
      - "Family name"
      - "Last name"

  given_names:
    label: "Given names"
    description: "The holder's given name or names."
    anchors:
      - "Given names"
      - "Given name"
      - "First name"

  nationality:
    label: "Nationality"
    description: "The holder's nationality."
    anchors:
      - "Nationality"

  date_of_birth:
    label: "Date of birth"
    description: "The holder's date of birth."
    anchors:
      - "Date of birth"
      - "DOB"

  sex:
    label: "Sex"
    description: "The holder's sex or gender marker."
    anchors:
      - "Sex"

  height:
    label: "Height"
    description: "The holder's height, when present."
    anchors:
      - "Height"

  place_of_birth:
    label: "Place of birth"
    description: "The holder's place of birth."
    anchors:
      - "Place of birth"

  date_of_issue:
    label: "Date of issue"
    description: "The date the passport was issued."
    anchors:
      - "Date of issue"
      - "Issue date"

  date_of_expiry:
    label: "Date of expiry"
    description: "The date the passport expires."
    anchors:
      - "Date of expiry"
      - "Expiry date"
      - "Date of expiration"

  mrz:
    label: "Machine-readable zone"
    max_value_fragments: 99
    description: "The machine-readable zone containing passport data."
    anchors:
      - "Machine-readable zone"
      - "MRZ"
    match_hints:
      - "Usually two lines near the bottom."
      - "Often contains many < characters."
      - "Choose fragments with machine-readable text such as < characters."
