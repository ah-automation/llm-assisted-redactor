extends: "common.yaml"

id: "passport.thai"
label: "Thai passport"
description: "Thai passport biographical data page and adjacent endorsement page."

document_hints:
  - "Thai passport samples may show a duplicate passport number vertically on an adjacent page."
  - "OCR may misread some English labels around Thai text."

field_overrides:
  passport_number:
    anchors_add:
      - "PassportNo"
      - "Pussport No"

  surname:
    anchors_add:
      - "Sumame"
    match_hints_add:
      - "Use the value directly below the surname label."

  given_names:
    anchors_add:
      - "Title / Name"
      - "Name"
    match_hints_add:
      - "Use the visible holder name field, not the surname field."

  nationality:
    anchors_add:
      - "Nationalty"

  date_of_birth:
    anchors_add:
      - "Date of bih"

  height:
    anchors_add:
      - "Heigh"

  place_of_birth:
    anchors_add:
      - "Place of birh"

  date_of_expiry:
    anchors_add:
      - "Date ofexpiry"

  mrz:
    match_hints_add:
      - "Often begins with P<THA."

fields:
  passport_number_cover:
    label: "Passport number on endorsement page"
    description: "Duplicate passport number printed vertically on the adjacent endorsement page."
    anchors:
      - "Passport No"
      - "Pussport No"
    match_hints:
      - "Use the vertical passport number near the vertical Passport No label on the endorsement page."
      - "Do not use the horizontal passport number on the biographical data page for this field."

  identification_number:
    label: "Identification number"
    description: "National identification number printed on the passport."
    anchors:
      - "Identification No"
      - "1denifconNo"
    match_hints:
      - "Use the long numeric value near the identification number label."
